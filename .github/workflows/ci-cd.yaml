name: Continous Integration and Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-build:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install make 
        run: sudo apt-get install make
      - name: Image build and push
        run: make prod-push

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test-build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Build Files
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "Makefile"
          target: "~/frontend"
      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: make deploy
